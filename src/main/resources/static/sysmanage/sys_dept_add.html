<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部门新增/编辑</title>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
            padding: 20px;
        }
        .form-container {
            max-width: 650px;
            margin: 0 auto;
        }
        .layui-form-item {
            margin-bottom: 15px;
        }
        .layui-form-label {
            width: 100px !important;
            padding: 9px 10px 9px 0;
        }
        .layui-input-block {
            margin-left: 100px !important;
        }
        .layui-input {
            height: 38px;
            line-height: 38px;
        }
        .required-star {
            color: red;
            margin-right: 3px;
        }
        .btn-group {
            margin-top: 25px;
            padding-left: 100px;
        }
        .btn-green {
            background-color: #86c566 !important;
            color: #fff !important;
            border-color: #86c566 !important;
        }
        .btn-green:hover {
            background-color: #7ab857 !important;
        }

        /* ========== 部门树样式 ========== */
        .dept-tree-container {
            border: 1px solid #e6e6e6;
            border-radius: 4px;
            padding: 15px;
            max-height: 280px;
            overflow-y: auto;
            background: #fafafa;
        }
        .dept-tree-container::-webkit-scrollbar {
            width: 6px;
        }
        .dept-tree-container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        /* 树节点 */
        .dept-node {
            margin-bottom: 2px;
        }
        .dept-node-header {
            display: flex;
            align-items: center;
            padding: 7px 10px;
            cursor: pointer;
            user-select: none;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .dept-node-header:hover {
            background: #eaeaea;
        }
        /* 选中行高亮 */
        .dept-node-header.selected {
            background: #d4edda;
        }

        /* 展开箭头 */
        .dept-node-header .arrow {
            margin-right: 6px;
            font-size: 12px;
            color: #999;
            transition: transform 0.2s;
            width: 14px;
            text-align: center;
            flex-shrink: 0;
        }
        .dept-node-header .arrow.expanded {
            transform: rotate(90deg);
        }
        .dept-node-header .arrow.empty {
            visibility: hidden;
        }

        /* ========== 自定义 radio 样式（绿色实心圆） ========== */
        .dept-radio {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            margin-right: 0;
        }
        .dept-radio input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
        .dept-radio .radio-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #ccc;
            background: #fff;
            margin-right: 6px;
            position: relative;
            flex-shrink: 0;
            transition: border-color 0.2s;
        }
        .dept-radio .radio-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #86c566;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.15s;
        }
        /* 选中状态 */
        .dept-radio input[type="radio"]:checked + .radio-icon {
            border-color: #86c566;
        }
        .dept-radio input[type="radio"]:checked + .radio-icon::after {
            transform: translate(-50%, -50%) scale(1);
        }
        /* hover */
        .dept-radio:hover .radio-icon {
            border-color: #86c566;
        }

        /* 部门名称 */
        .dept-node-header .dept-name {
            font-size: 14px;
            color: #333;
            margin-left: 2px;
        }
        /* 级别标签 */
        .dept-node-header .dept-level-tag {
            font-size: 11px;
            color: #999;
            margin-left: 8px;
            background: #f0f0f0;
            padding: 1px 6px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        /* 子节点缩进 */
        .dept-children {
            padding-left: 24px;
            display: none;
        }
        .dept-children.show {
            display: block;
        }

        /* 部门级别只读显示 */
        .dept-level-display {
            display: inline-block;
            padding: 0 15px;
            height: 38px;
            line-height: 38px;
            background: #f2f2f2;
            border-radius: 4px;
            color: #666;
            font-size: 14px;
        }
        .form-tip {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<form class="layui-form form-container" lay-filter="deptForm" id="deptForm">
    <input type="hidden" name="id" id="deptId" value="">
    <input type="hidden" name="parentId" id="parentId" value="0">
    <input type="hidden" name="deptLevel" id="deptLevel" value="1">

    <!-- 部门名称 -->
    <div class="layui-form-item">
        <label class="layui-form-label">
            <span class="required-star">*</span>部门名称
        </label>
        <div class="layui-input-block">
            <input type="text" name="deptName" id="deptName" lay-verify="required"
                   placeholder="请输入部门名称" class="layui-input" style="width: 400px;" maxlength="50">
        </div>
    </div>

    <!-- 部门编码 -->
    <div class="layui-form-item">
        <label class="layui-form-label">
            <span class="required-star">*</span>部门编码
        </label>
        <div class="layui-input-block">
            <input type="text" name="deptCode" id="deptCode" lay-verify="required"
                   placeholder="请输入部门编码，如：DEPT_IT" class="layui-input" style="width: 400px;" maxlength="50">
        </div>
    </div>

    <!-- 上级部门 -->
    <div class="layui-form-item">
        <label class="layui-form-label">上级部门</label>
        <div class="layui-input-block">
            <input type="radio" name="hasParent" value="0" title="无（顶级部门）" checked lay-filter="hasParentFilter">
            <input type="radio" name="hasParent" value="1" title="有上级部门" lay-filter="hasParentFilter">
        </div>
    </div>

    <!-- 上级部门选择（树形，默认隐藏） -->
    <div class="layui-form-item" id="parentDeptRow" style="display: none;">
        <label class="layui-form-label">
            <span class="required-star">*</span>选择上级
        </label>
        <div class="layui-input-block">
            <div class="dept-tree-container" id="deptTreeContainer">
                <div style="text-align:center; color:#999; padding:10px;">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 部门级别 -->
    <div class="layui-form-item">
        <label class="layui-form-label">部门级别</label>
        <div class="layui-input-block">
            <span class="dept-level-display" id="deptLevelDisplay">一级部门</span>
            <div class="form-tip">部门级别根据上级部门自动确定，不可手动修改</div>
        </div>
    </div>

    <!-- 负责人 -->
    <div class="layui-form-item">
        <label class="layui-form-label">负责人</label>
        <div class="layui-input-block">
            <input type="text" name="leader" id="leader"
                   placeholder="请输入负责人姓名" class="layui-input" style="width: 400px;" maxlength="50">
        </div>
    </div>

    <!-- 联系电话 -->
    <div class="layui-form-item">
        <label class="layui-form-label">联系电话</label>
        <div class="layui-input-block">
            <input type="text" name="phone" id="phone" lay-verify="phone"
                   placeholder="请输入联系电话" class="layui-input" style="width: 400px;" maxlength="20">
        </div>
    </div>

    <!-- 排序号 -->
    <div class="layui-form-item">
        <label class="layui-form-label">排序号</label>
        <div class="layui-input-block">
            <input type="number" name="sortNum" id="sortNum"
                   placeholder="请输入排序号，数字越小越靠前" class="layui-input" style="width: 200px;" value="0" min="0">
        </div>
    </div>

    <!-- 状态 -->
    <div class="layui-form-item">
        <label class="layui-form-label">状态</label>
        <div class="layui-input-block">
            <input type="radio" name="status" value="1" title="启用" checked lay-filter="statusFilter">
            <input type="radio" name="status" value="0" title="禁用" lay-filter="statusFilter">
        </div>
    </div>

    <!-- 按钮 -->
    <div class="layui-form-item btn-group">
        <button type="button" class="layui-btn btn-green" lay-submit lay-filter="deptSubmit" id="submitBtn">保存</button>
        <button type="button" class="layui-btn layui-btn-primary" onclick="closeWindow()">取消</button>
    </div>
</form>

<script src="/layui/layui.js"></script>
<script>
var token = localStorage.getItem('token');
var deptTreeData = [];
var selectedParentId = null;
var selectedParentLevel = null;
var editingDeptId = null;

var levelMap = {
    '1': '一级部门',
    '2': '二级部门',
    '3': '三级部门',
    '4': '四级部门'
};

function getQueryString(name) {
    var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
    var r = window.location.search.substr(1).match(reg);
    if (r != null) return decodeURIComponent(r[2]);
    return null;
}

function closeWindow() {
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
}

// 更新部门级别显示
function updateDeptLevelDisplay() {
    var hasParent = document.querySelector('input[name="hasParent"]:checked').value;
    var displayEl = document.getElementById('deptLevelDisplay');
    var levelInput = document.getElementById('deptLevel');

    if (hasParent === '1') {
        if (selectedParentLevel != null) {
            var newLevel = parseInt(selectedParentLevel) + 1;
            levelInput.value = newLevel;
            displayEl.textContent = levelMap[String(newLevel)] || (newLevel + '级部门');
        } else {
            levelInput.value = '';
            displayEl.textContent = '请先选择上级部门';
        }
    } else {
        selectedParentId = null;
        selectedParentLevel = null;
        document.getElementById('parentId').value = 0;
        levelInput.value = 1;
        displayEl.textContent = '一级部门';
        clearTreeSelection();
    }
}

// 清除树中选中状态
function clearTreeSelection() {
    var radios = document.querySelectorAll('#deptTreeContainer input[name="parentDeptRadio"]');
    radios.forEach(function(r) { r.checked = false; });
    document.querySelectorAll('#deptTreeContainer .dept-node-header.selected').forEach(function(el) {
        el.classList.remove('selected');
    });
}

// 加载部门树
function loadDeptTree($) {
    return $.ajax({
        url: '/sys/dept/tree',
        type: 'GET',
        headers: {token: token},
        success: function(res) {
            if (res.code === 200) {
                deptTreeData = res.data || [];
            }
        }
    });
}

// 递归构建部门树 HTML（原生 radio + 自定义样式，不走 Layui 渲染）
function buildDeptTreeHtml(depts) {
    var html = '';
    if (!depts || depts.length === 0) return html;

    depts.forEach(function(dept) {
        if (editingDeptId && dept.id == editingDeptId) return;

        var deptLevel = dept.deptLevel;
        var hasChildren = dept.children && dept.children.length > 0;

        html += '<div class="dept-node" data-id="' + dept.id + '">';
        html += '<div class="dept-node-header" data-id="' + dept.id + '">';

        // 展开箭头
        html += '<span class="arrow ' + (hasChildren ? '' : 'empty') + '">&#9654;</span>';

        // 自定义 radio + 部门名称 + 级别标签
        html += '<label class="dept-radio">';
        html += '<input type="radio" name="parentDeptRadio" value="' + dept.id + '" ';
        html += 'data-id="' + dept.id + '" data-level="' + deptLevel + '" lay-ignore>';
        html += '<span class="radio-icon"></span>';
        html += '<span class="dept-name">' + (dept.deptName || '') + '</span>';
        html += '</label>';

        html += '<span class="dept-level-tag">' + (levelMap[String(deptLevel)] || (deptLevel + '级')) + '</span>';

        html += '</div>'; // .dept-node-header

        // 子节点
        if (hasChildren) {
            html += '<div class="dept-children">';
            html += buildDeptTreeHtml(dept.children);
            html += '</div>';
        }

        html += '</div>'; // .dept-node
    });

    return html;
}

// 渲染部门树
function renderDeptTree() {
    var container = document.getElementById('deptTreeContainer');

    if (!deptTreeData || deptTreeData.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:#999; padding:10px;">暂无部门数据</div>';
        return;
    }

    container.innerHTML = buildDeptTreeHtml(deptTreeData);
}

// 绑定树事件（事件委托）
function bindDeptTreeEvents($) {
    var $container = $('#deptTreeContainer');

    // radio 选中
    $container.on('change', 'input[name="parentDeptRadio"]', function() {
        var id = parseInt($(this).data('id'));
        var level = $(this).data('level');

        selectedParentId = id;
        selectedParentLevel = level;
        document.getElementById('parentId').value = id;

        // 行高亮：先清除，再加当前
        $container.find('.dept-node-header').removeClass('selected');
        $(this).closest('.dept-node-header').addClass('selected');

        updateDeptLevelDisplay();
    });

    // 点击行：展开/收起子节点
    $container.on('click', '.dept-node-header', function(e) {
        // 点击 radio 本身或其 label 时不触发展开
        if ($(e.target).closest('.dept-radio').length > 0) return;

        var $arrow = $(this).find('.arrow');
        var $nodeDiv = $(this).parent();
        var $children = $nodeDiv.find('> .dept-children');

        if ($children.length > 0) {
            $children.toggleClass('show');
            $arrow.toggleClass('expanded');
        }
    });
}

// 编辑回显：选中树中某个部门
function selectDeptInTree($, deptId) {
    var $radio = $('#deptTreeContainer input[name="parentDeptRadio"][data-id="' + deptId + '"]');
    if ($radio.length === 0) return;

    // 选中 radio
    $radio.prop('checked', true);

    var level = $radio.data('level');
    selectedParentId = parseInt(deptId);
    selectedParentLevel = level;
    document.getElementById('parentId').value = deptId;

    // 行高亮
    $('#deptTreeContainer .dept-node-header').removeClass('selected');
    $radio.closest('.dept-node-header').addClass('selected');

    // 展开所有父级使选中节点可见
    $radio.parents('.dept-children').each(function() {
        $(this).addClass('show');
        $(this).parent().find('> .dept-node-header .arrow').addClass('expanded');
    });

    updateDeptLevelDisplay();
}

function phoneValidator(value) {
    if (!value) return true;
    var reg = /^1[3-9]\d{9}$/;
    return reg.test(value);
}

layui.use(['form', 'layer'], function(){
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.jquery;

    form.verify({
        phone: function(value) {
            if (value && !phoneValidator(value)) {
                return '请输入正确的手机号码';
            }
        }
    });

    var deptId = getQueryString('id');
    if (deptId) {
        editingDeptId = deptId;
        document.getElementById('deptId').value = deptId;
    }

    // 加载部门树
    loadDeptTree($).done(function() {
        renderDeptTree();
        bindDeptTreeEvents($);

        // 编辑模式：加载部门数据并回填
        if (deptId) {
            $.ajax({
                url: '/sys/dept/get/' + deptId,
                type: 'GET',
                headers: {token: token},
                success: function(res) {
                    if (res.code === 200 && res.data) {
                        var data = res.data;
                        document.getElementById('deptName').value = data.deptName || '';
                        document.getElementById('deptCode').value = data.deptCode || '';
                        document.getElementById('leader').value = data.leader || '';
                        document.getElementById('phone').value = data.phone || '';
                        document.getElementById('sortNum').value = data.sortNum != null ? data.sortNum : 0;

                        if (data.status === 0) {
                            $('input[name="status"][value="0"]').prop('checked', true);
                            $('input[name="status"][value="1"]').prop('checked', false);
                        }
                        form.render('radio', 'deptForm');

                        // 上级部门处理
                        if (data.parentId && data.parentId !== 0) {
                            $('input[name="hasParent"][value="1"]').prop('checked', true);
                            $('input[name="hasParent"][value="0"]').prop('checked', false);
                            document.getElementById('parentDeptRow').style.display = '';
                            document.getElementById('parentId').value = data.parentId;

                            selectDeptInTree($, data.parentId);

                            if (data.deptLevel) {
                                document.getElementById('deptLevel').value = data.deptLevel;
                                document.getElementById('deptLevelDisplay').textContent = levelMap[String(data.deptLevel)] || (data.deptLevel + '级部门');
                            }
                        } else {
                            $('input[name="hasParent"][value="0"]').prop('checked', true);
                            $('input[name="hasParent"][value="1"]').prop('checked', false);
                            document.getElementById('parentDeptRow').style.display = 'none';
                            document.getElementById('deptLevel').value = 1;
                            document.getElementById('deptLevelDisplay').textContent = '一级部门';
                        }
                        form.render('radio');
                    }
                }
            });
        }
    });

    // 监听"是否有上级部门"切换
    form.on('radio(hasParentFilter)', function(data) {
        var val = data.value;
        var parentDeptRow = document.getElementById('parentDeptRow');

        if (val === '1') {
            parentDeptRow.style.display = '';
            if (selectedParentId) {
                updateDeptLevelDisplay();
            } else {
                document.getElementById('deptLevelDisplay').textContent = '请先选择上级部门';
                document.getElementById('deptLevel').value = '';
            }
        } else {
            parentDeptRow.style.display = 'none';
            selectedParentId = null;
            selectedParentLevel = null;
            document.getElementById('parentId').value = 0;
            document.getElementById('deptLevel').value = 1;
            document.getElementById('deptLevelDisplay').textContent = '一级部门';
            clearTreeSelection();
        }
    });

    // 监听提交
    var isSubmitting = false;
    form.on('submit(deptSubmit)', function(){
        if (isSubmitting) return false;

        var hasParent = document.querySelector('input[name="hasParent"]:checked').value;
        if (hasParent === '1' && !selectedParentId) {
            layer.msg('请选择上级部门', {icon: 5});
            return false;
        }
        if (hasParent === '1' && selectedParentLevel && parseInt(selectedParentLevel) >= 4) {
            layer.msg('上级部门已为四级部门，无法再创建下级部门', {icon: 5});
            return false;
        }

        isSubmitting = true;

        var deptName = document.getElementById('deptName').value.trim();
        var deptCode = document.getElementById('deptCode').value.trim();
        var leader = document.getElementById('leader').value.trim();
        var phone = document.getElementById('phone').value.trim();
        var sortNum = parseInt(document.getElementById('sortNum').value) || 0;
        var status = parseInt($('input[name="status"]:checked').val());
        var parentId = parseInt(document.getElementById('parentId').value);
        var deptLevel = parseInt(document.getElementById('deptLevel').value);
        var id = document.getElementById('deptId').value;

        var isEdit = !!id;
        var url = isEdit ? '/sys/dept/update' : '/sys/dept/add';
        var method = isEdit ? 'PUT' : 'POST';

        var $submitBtn = $('#submitBtn');
        $submitBtn.prop('disabled', true).addClass('layui-btn-disabled').text('保存中...');

        var postData = {
            deptName: deptName,
            deptCode: deptCode,
            leader: leader,
            phone: phone,
            sortNum: sortNum,
            status: status,
            parentId: parentId,
            deptLevel: deptLevel
        };

        if (isEdit) {
            postData.id = parseInt(id);
        }

        $.ajax({
            url: url,
            type: method,
            headers: {token: token},
            contentType: 'application/json',
            data: JSON.stringify(postData),
            success: function(res) {
                if (res.code === 200) {
                    layer.msg(isEdit ? '更新成功' : '新增成功', {icon: 1}, function(){
                        closeWindow();
                    });
                } else {
                    layer.msg(res.msg || '操作失败', {icon: 2});
                    isSubmitting = false;
                    $submitBtn.prop('disabled', false).removeClass('layui-btn-disabled').text('保存');
                }
            },
            error: function() {
                layer.msg('请求失败，请重试', {icon: 2});
                isSubmitting = false;
                $submitBtn.prop('disabled', false).removeClass('layui-btn-disabled').text('保存');
            }
        });
        return false;
    });
});
</script>

</body>
</html>
