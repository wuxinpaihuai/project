<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色新增</title>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
            padding: 20px;
        }
        .form-container {
            max-width: 650px;
            margin: 0 auto;
        }
        .layui-form-item {
            margin-bottom: 15px;
        }
        .layui-form-label {
            width: 100px !important;
            padding: 9px 10px 9px 0;
        }
        .layui-input-block {
            margin-left: 100px !important;
        }
        .layui-input {
            height: 38px;
            line-height: 38px;
        }
        .required-star {
            color: red;
            margin-right: 3px;
        }
        .btn-group {
            margin-top: 25px;
            padding-left: 100px;
        }
        .btn-green {
            background-color: #86c566 !important;
            color: #fff !important;
            border-color: #86c566 !important;
        }
        .btn-green:hover {
            background-color: #7ab857 !important;
        }
        /* 菜单权限树样式 */
        .menu-tree-container {
            border: 1px solid #e6e6e6;
            border-radius: 4px;
            padding: 15px;
            max-height: 280px;
            overflow-y: auto;
            background: #fafafa;
        }
        .menu-tree-container .layui-form-checkbox {
            margin: 4px 10px 4px 0 !important;
        }
        /* 一级菜单分组 */
        .menu-parent-group {
            margin-bottom: 8px;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            background: #fff;
            overflow: hidden;
        }
        .menu-parent-header {
            background-color: #f5f5f5;
            padding: 8px 12px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
        }
        .menu-parent-header .parent-checkbox {
            flex: 1;
        }
        .menu-children-list {
            padding: 8px 12px 8px 36px;
        }
        .menu-children-list .child-item {
            display: inline-block;
            margin: 2px 0;
        }
    </style>
</head>
<body>
<form class="layui-form form-container" lay-filter="roleForm" id="roleForm">
    <input type="hidden" name="id" id="roleId" value="">

    <!-- 角色名称 -->
    <div class="layui-form-item">
        <label class="layui-form-label">
            <span class="required-star">*</span>角色名称
        </label>
        <div class="layui-input-block">
            <input type="text" name="roleName" id="roleName" lay-verify="required"
                   placeholder="请输入角色名称" class="layui-input" style="width: 400px;" maxlength="50">
        </div>
    </div>

    <!-- 角色编码 -->
    <div class="layui-form-item">
        <label class="layui-form-label">
            <span class="required-star">*</span>角色编码
        </label>
        <div class="layui-input-block">
            <input type="text" name="roleCode" id="roleCode" lay-verify="required"
                   placeholder="请输入角色编码，如：admin" class="layui-input" style="width: 400px;" maxlength="50">
        </div>
    </div>

    <!-- 角色描述 -->
    <div class="layui-form-item">
        <label class="layui-form-label">角色描述</label>
        <div class="layui-input-block">
            <input type="text" name="roleDesc" id="roleDesc"
                   placeholder="请输入角色描述" class="layui-input" style="width: 400px;" maxlength="200">
        </div>
    </div>

    <!-- 状态 -->
    <div class="layui-form-item">
        <label class="layui-form-label">状态</label>
        <div class="layui-input-block">
            <input type="radio" name="status" value="1" title="启用" checked lay-filter="statusFilter">
            <input type="radio" name="status" value="0" title="禁用" lay-filter="statusFilter">
        </div>
    </div>

    <!-- 菜单权限 -->
    <div class="layui-form-item">
        <label class="layui-form-label">菜单权限</label>
        <div class="layui-input-block">
            <div class="menu-tree-container" id="menuTreeContainer">
                <div style="text-align:center; color:#999; padding:10px;">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 按钮 -->
    <div class="layui-form-item btn-group">
        <button type="button" class="layui-btn btn-green" lay-submit lay-filter="roleSubmit" id="submitBtn">保存</button>
        <button type="button" class="layui-btn layui-btn-primary" onclick="closeWindow()">取消</button>
    </div>
</form>

<script src="/layui/layui.js"></script>
<script>
var token = localStorage.getItem('token');
var menuTreeData = [];     // 菜单树原始数据
var checkedMenuIds = [];   // 当前选中的菜单ID

// 获取URL参数
function getQueryString(name) {
    var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
    var r = window.location.search.substr(1).match(reg);
    if (r != null) return decodeURIComponent(r[2]);
    return null;
}

// 关闭窗口
function closeWindow() {
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
}

// 加载菜单树
function loadMenuTree($) {
    return $.ajax({
        url: '/getMenuTree',
        type: 'GET',
        headers: {token: token},
        success: function(res) {
            if (res.code === 200) {
                menuTreeData = res.data || [];
            }
        }
    });
}

// 渲染菜单权限树（分组式：父菜单+子菜单）
function renderMenuTree(form) {
    var container = document.getElementById('menuTreeContainer');
    if (!menuTreeData || menuTreeData.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:#999; padding:10px;">暂无菜单</div>';
        return;
    }

    var html = '';
    menuTreeData.forEach(function(parent) {
        var parentId = parent.id;
        var hasChildren = parent.children && parent.children.length > 0;

        html += '<div class="menu-parent-group" data-parent-id="' + parentId + '">';
        html += '<div class="menu-parent-header">';
        html += '<div class="parent-checkbox">';
        html += '<input type="checkbox" name="menuIds" value="' + parentId + '" title="' + parent.menuName + '" lay-skin="primary" lay-filter="parentMenu" data-parent-id="' + parentId + '">';
        html += '</div>';
        html += '</div>';

        if (hasChildren) {
            html += '<div class="menu-children-list">';
            parent.children.forEach(function(child) {
                html += '<div class="child-item">';
                html += '<input type="checkbox" name="menuIds" value="' + child.id + '" title="' + child.menuName + '" lay-skin="primary" lay-filter="childMenu" data-parent-id="' + parentId + '">';
                html += '</div>';
            });
            html += '</div>';
        }

        html += '</div>';
    });

    container.innerHTML = html;
    form.render('checkbox');
}

// 监听父菜单checkbox - 选中/取消父菜单时联动子菜单
function bindMenuTreeEvents(form, $) {
    // 父菜单点击
    form.on('checkbox(parentMenu)', function(data) {
        var parentId = $(data.elem).data('parent-id');
        var isChecked = data.elem.checked;
        var $group = $(data.elem).closest('.menu-parent-group');

        // 联动：选中/取消该父菜单下所有子菜单
        $group.find('.menu-children-list input[type="checkbox"]').each(function() {
            this.checked = isChecked;
        });
        form.render('checkbox');
    });

    // 子菜单点击
    form.on('checkbox(childMenu)', function(data) {
        var parentId = $(data.elem).data('parent-id');
        var $group = $(data.elem).closest('.menu-parent-group');
        var $parentCheckbox = $group.find('.menu-parent-header input[type="checkbox"]');

        // 判断：如果所有子菜单都选中了，则自动选中父菜单；如果有一个取消，则取消父菜单
        var totalChildren = $group.find('.menu-children-list input[type="checkbox"]').length;
        var checkedChildren = $group.find('.menu-children-list input[type="checkbox"]:checked').length;

        if (checkedChildren === totalChildren && totalChildren > 0) {
            $parentCheckbox[0].checked = true;
        } else {
            $parentCheckbox[0].checked = false;
        }
        form.render('checkbox');
    });
}

// 获取所有选中的菜单ID
function getCheckedMenuIds($) {
    var ids = [];
    $('#menuTreeContainer input[name="menuIds"]:checked').each(function() {
        ids.push(parseInt($(this).val()));
    });
    return ids;
}

// 编辑时回显已选菜单
function setCheckedMenuIds(form, $, menuIds) {
    if (!menuIds || menuIds.length === 0) return;

    $('#menuTreeContainer input[name="menuIds"]').each(function() {
        var val = parseInt($(this).val());
        if (menuIds.indexOf(val) > -1) {
            this.checked = true;
        }
    });

    // 回显后，检查父菜单是否需要自动选中
    $('.menu-parent-group').each(function() {
        var $group = $(this);
        var $parentCheckbox = $group.find('.menu-parent-header input[type="checkbox"]');
        var totalChildren = $group.find('.menu-children-list input[type="checkbox"]').length;
        var checkedChildren = $group.find('.menu-children-list input[type="checkbox"]:checked').length;

        if (totalChildren > 0 && checkedChildren === totalChildren) {
            $parentCheckbox[0].checked = true;
        }
    });

    form.render('checkbox');
}

layui.use(['form', 'layer'], function(){
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.jquery;

    // 先加载菜单树
    loadMenuTree($).done(function() {
        renderMenuTree(form);
        bindMenuTreeEvents(form, $);

        // 如果是编辑模式，加载角色数据和已选菜单
        var roleId = getQueryString('id');
        if (roleId) {
            document.getElementById('roleId').value = roleId;

            // 加载角色基本信息
            $.ajax({
                url: '/sys/role/get/' + roleId,
                type: 'GET',
                headers: {token: token},
                success: function(res) {
                    if (res.code === 200 && res.data) {
                        var data = res.data;
                        document.getElementById('roleName').value = data.roleName || '';
                        document.getElementById('roleCode').value = data.roleCode || '';
                        document.getElementById('roleDesc').value = data.roleDesc || '';

                        // 设置状态
                        if (data.status === 0) {
                            $('input[name="status"][value="0"]').prop('checked', true);
                            $('input[name="status"][value="1"]').prop('checked', false);
                        }
                        form.render('radio');
                    }
                }
            });

            // 加载已选菜单权限
            $.ajax({
                url: '/sys/role/menus/' + roleId,
                type: 'GET',
                headers: {token: token},
                success: function(res) {
                    if (res.code === 200 && res.data) {
                        setCheckedMenuIds(form, $, res.data);
                    }
                }
            });
        }
    });

    // 监听提交
    var isSubmitting = false;
    form.on('submit(roleSubmit)', function(){
        if (isSubmitting) return false;
        isSubmitting = true;

        var roleName = document.getElementById('roleName').value.trim();
        var roleCode = document.getElementById('roleCode').value.trim();
        var roleDesc = document.getElementById('roleDesc').value.trim();
        var status = $('input[name="status"]:checked').val();
        var id = document.getElementById('roleId').value;
        var menuIds = getCheckedMenuIds($);

        var isEdit = !!id;
        var url = isEdit ? '/sys/role/update' : '/sys/role/add';
        var method = isEdit ? 'PUT' : 'POST';

        // 禁用保存按钮
        var $submitBtn = $('#submitBtn');
        $submitBtn.prop('disabled', true).addClass('layui-btn-disabled').text('保存中...');

        var data = {
            roleName: roleName,
            roleCode: roleCode,
            roleDesc: roleDesc,
            status: parseInt(status),
            menuIds: menuIds
        };

        if (isEdit) {
            data.id = parseInt(id);
        }

        $.ajax({
            url: url,
            type: method,
            headers: {token: token},
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(res) {
                if (res.code === 200) {
                    layer.msg(isEdit ? '更新成功' : '新增成功', {icon: 1}, function(){
                        closeWindow();
                    });
                } else {
                    layer.msg(res.msg || '操作失败', {icon: 2});
                    isSubmitting = false;
                    $submitBtn.prop('disabled', false).removeClass('layui-btn-disabled').text('保存');
                }
            },
            error: function() {
                layer.msg('请求失败，请重试', {icon: 2});
                isSubmitting = false;
                $submitBtn.prop('disabled', false).removeClass('layui-btn-disabled').text('保存');
            }
        });
        return false;
    });
});
</script>
</body>
</html>
