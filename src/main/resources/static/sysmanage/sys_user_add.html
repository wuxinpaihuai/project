<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户新增</title>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
            padding: 20px;
        }
        .form-container {
            max-width: 650px;
            margin: 0 auto;
        }
        .layui-form-item {
            margin-bottom: 15px;
        }
        .layui-form-label {
            width: 100px !important;
            padding: 9px 10px 9px 0;
        }
        .layui-input-block {
            margin-left: 100px !important;
        }
        .layui-input {
            height: 38px;
            line-height: 38px;
        }
        .required-star {
            color: red;
            margin-right: 3px;
        }
        .btn-group {
            margin-top: 25px;
            padding-left: 100px;
        }
        .btn-green {
            background-color: #86c566 !important;
            color: #fff !important;
            border-color: #86c566 !important;
        }
        .btn-green:hover {
            background-color: #7ab857 !important;
        }
        /* 部门选择区域样式 - 按层级平铺 */
        .dept-tree-container {
            border: 1px solid #e6e6e6;
            border-radius: 4px;
            padding: 15px;
            max-height: 280px;
            overflow-y: auto;
            background: #fafafa;
        }
        .dept-tree-container .layui-form-checkbox {
            margin: 4px 10px 4px 0 !important;
        }
        .dept-level-group {
            margin-bottom: 6px;
        }
        .dept-level-header {
            font-size: 13px;
            color: #666;
            padding: 4px 0 2px 0;
            border-bottom: 1px dashed #e0e0e0;
            margin-bottom: 4px;
        }
        .dept-level-header:first-child {
            border-bottom: none;
        }
        .dept-checkbox-row {
            padding-left: 0;
        }
        .dept-checkbox-row.level-1 {
            padding-left: 0;
        }
        .dept-checkbox-row.level-2 {
            padding-left: 24px;
        }
        .dept-checkbox-row.level-3 {
            padding-left: 48px;
        }
        .dept-checkbox-row.level-4 {
            padding-left: 72px;
        }
        .dept-checkbox-row.level-5 {
            padding-left: 96px;
        }
        /* 角色选择区域样式 */
        .role-list-container {
            border: 1px solid #e6e6e6;
            border-radius: 4px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            background: #fafafa;
        }
        .role-list-container .layui-form-checkbox {
            margin: 4px 10px 4px 0 !important;
        }
        .role-item {
            display: inline-block;
            margin: 2px 0;
        }
        /* 密码编辑提示 */
        .pwd-tip {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<form class="layui-form form-container" lay-filter="userForm" id="userForm">
    <input type="hidden" name="id" id="userId" value="">

    <!-- 用户名 -->
    <div class="layui-form-item">
        <label class="layui-form-label">
            <span class="required-star">*</span>用户名
        </label>
        <div class="layui-input-block">
            <input type="text" name="username" id="username" lay-verify="required"
                   placeholder="请输入用户名" class="layui-input" style="width: 400px;" maxlength="50">
        </div>
    </div>

    <!-- 密码 -->
    <div class="layui-form-item">
        <label class="layui-form-label">
            <span class="required-star" id="pwdStar">*</span>密码
        </label>
        <div class="layui-input-block">
            <input type="password" name="password" id="password" lay-verify="pwdRequired"
                   placeholder="请输入密码" class="layui-input" style="width: 400px;" maxlength="50">
            <div class="pwd-tip" id="pwdTip" style="display:none;">编辑时留空则不修改密码</div>
        </div>
    </div>

    <!-- 姓名 -->
    <div class="layui-form-item">
        <label class="layui-form-label">
            <span class="required-star">*</span>姓名
        </label>
        <div class="layui-input-block">
            <input type="text" name="realName" id="realName" lay-verify="required"
                   placeholder="请输入姓名" class="layui-input" style="width: 400px;" maxlength="50">
        </div>
    </div>

    <!-- 手机号 -->
    <div class="layui-form-item">
        <label class="layui-form-label">
            <span class="required-star">*</span>手机号
        </label>
        <div class="layui-input-block">
            <input type="text" name="phone" id="phone" lay-verify="required|phone"
                   placeholder="请输入手机号" class="layui-input" style="width: 400px;" maxlength="11">
        </div>
    </div>

    <!-- 岗位 -->
    <div class="layui-form-item">
        <label class="layui-form-label">岗位</label>
        <div class="layui-input-block">
            <select name="sysPosition" id="sysPosition" lay-filter="positionFilter">
                <option value="">请选择岗位</option>
                <option value="0">董事长</option>
                <option value="1">总裁</option>
                <option value="2">副总裁</option>
                <option value="3">处长</option>
                <option value="4">副处长</option>
                <option value="5">技术学术委员会主任</option>
                <option value="6">副主任</option>
                <option value="7">处长助理</option>
                <option value="8">普通员工</option>
            </select>
        </div>
    </div>

    <!-- 是否禁用 -->
    <div class="layui-form-item">
        <label class="layui-form-label">是否禁用</label>
        <div class="layui-input-block">
            <input type="radio" name="status" value="1" title="正常" checked lay-filter="statusFilter">
            <input type="radio" name="status" value="0" title="禁用" lay-filter="statusFilter">
        </div>
    </div>

    <!-- 所属部门（多选，按层级平铺所有部门） -->
    <div class="layui-form-item">
        <label class="layui-form-label">所属部门</label>
        <div class="layui-input-block">
            <div class="dept-tree-container" id="deptTreeContainer">
                <div style="text-align:center; color:#999; padding:10px;">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 用户角色（多选，平铺） -->
    <div class="layui-form-item">
        <label class="layui-form-label">用户角色</label>
        <div class="layui-input-block">
            <div class="role-list-container" id="roleListContainer">
                <div style="text-align:center; color:#999; padding:10px;">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 按钮 -->
    <div class="layui-form-item btn-group">
        <button type="button" class="layui-btn btn-green" lay-submit lay-filter="userSubmit" id="submitBtn">保存</button>
        <button type="button" class="layui-btn layui-btn-primary" onclick="closeWindow()">取消</button>
    </div>
</form>

<script src="/layui/layui.js"></script>
<script>
var token = localStorage.getItem('token');
var deptTreeData = [];      // 部门树原始数据
var roleListData = [];       // 角色列表原始数据
var isEditMode = false;      // 是否编辑模式

// 获取URL参数
function getQueryString(name) {
    var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
    var r = window.location.search.substr(1).match(reg);
    if (r != null) return decodeURIComponent(r[2]);
    return null;
}

// 关闭窗口
function closeWindow() {
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
}

/* ========== 部门树相关 ========== */

// 加载部门树数据
function loadDeptTree($) {
    return $.ajax({
        url: '/sys/dept/tree',
        type: 'GET',
        headers: {token: token},
        success: function(res) {
            if (res.code === 200) {
                deptTreeData = res.data || [];
            }
        }
    });
}

// 递归渲染所有部门checkbox，按层级缩进平铺
// 每个部门都是独立的checkbox，选中时不管父子关系，互不影响
function renderDeptTreeRecursive(depts, level, form) {
    var html = '';
    if (!depts || depts.length === 0) return html;

    depts.forEach(function(dept) {
        var hasChildren = dept.children && dept.children.length > 0;
        // levelClass 用于缩进
        var levelClass = 'level-' + Math.min(level, 5);

        html += '<div class="dept-checkbox-row ' + levelClass + '" data-dept-id="' + dept.id + '">';
        html += '<input type="checkbox" name="deptIds" value="' + dept.id + '" title="' + dept.deptName + '" lay-skin="primary" lay-filter="deptCheck" data-dept-id="' + dept.id + '">';
        html += '</div>';

        // 递归渲染子部门
        if (hasChildren) {
            html += renderDeptTreeRecursive(dept.children, level + 1, form);
        }
    });

    return html;
}

// 渲染部门选择区域（按层级平铺所有部门）
function renderDeptTree(form) {
    var container = document.getElementById('deptTreeContainer');
    if (!deptTreeData || deptTreeData.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:#999; padding:10px;">暂无部门</div>';
        return;
    }

    var html = renderDeptTreeRecursive(deptTreeData, 1, form);
    container.innerHTML = html;
    form.render('checkbox');
}

// 监听部门checkbox事件
// 规则：选中/取消部门时，不管父子关系，每个部门独立选择
function bindDeptTreeEvents(form, $) {
    // 所有部门checkbox都使用 deptCheck filter，不做任何父子联动
    form.on('checkbox(deptCheck)', function(data) {
        // 不做任何联动，用户手动选择
    });
}

// 从class字符串中提取层级数字
function getLevelFromClass(className) {
    var match = className.match(/level-(\d+)/);
    return match ? parseInt(match[1]) : 1;
}

// 获取所有选中的部门ID
function getCheckedDeptIds($) {
    var ids = [];
    $('#deptTreeContainer input[name="deptIds"]:checked').each(function() {
        ids.push(parseInt($(this).val()));
    });
    return ids;
}

// 编辑时回显已选部门（只回显传入的ID，不自动选中父部门）
// 兼容接口返回纯ID数组 [1,2,3] 或对象数组 [{id:1,...},{id:2,...}]
function setCheckedDeptIds(form, $, deptIds) {
    if (!deptIds || deptIds.length === 0) return;

    // 统一提取为字符串ID数组，避免Long精度问题和类型不匹配
    var idList = [];
    deptIds.forEach(function(item) {
        if (typeof item === 'object' && item !== null) {
            idList.push(String(item.id));
        } else {
            idList.push(String(item));
        }
    });

    console.log('[DEBUG] setCheckedDeptIds - idList:', idList);

    $('#deptTreeContainer input[name="deptIds"]').each(function() {
        var val = $(this).val(); // 保持字符串比较
        console.log('[DEBUG] checkbox value:', val, 'match:', idList.indexOf(val) > -1);
        if (idList.indexOf(val) > -1) {
            $(this).prop('checked', true);
        }
    });

    form.render('checkbox');
}

/* ========== 角色列表相关 ========== */

// 加载角色全量列表
function loadRoleList($) {
    return $.ajax({
        url: '/sys/role/all',
        type: 'GET',
        headers: {token: token},
        success: function(res) {
            if (res.code === 200) {
                roleListData = res.data || [];
            }
        }
    });
}

// 渲染角色选择列表（平铺多选）
function renderRoleList(form) {
    var container = document.getElementById('roleListContainer');
    if (!roleListData || roleListData.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:#999; padding:10px;">暂无角色</div>';
        return;
    }

    var html = '';
    roleListData.forEach(function(role) {
        html += '<div class="role-item">';
        html += '<input type="checkbox" name="roleIds" value="' + role.id + '" title="' + role.roleName + '" lay-skin="primary" lay-filter="roleCheck">';
        html += '</div>';
    });

    container.innerHTML = html;
    form.render('checkbox');
}

// 获取所有选中的角色ID
function getCheckedRoleIds($) {
    var ids = [];
    $('#roleListContainer input[name="roleIds"]:checked').each(function() {
        ids.push(parseInt($(this).val()));
    });
    return ids;
}

// 编辑时回显已选角色
// 兼容接口返回纯ID数组 [1,2,3] 或对象数组 [{id:1,...},{id:2,...}]
function setCheckedRoleIds(form, $, roleIds) {
    if (!roleIds || roleIds.length === 0) return;

    // 统一提取为字符串ID数组
    var idList = [];
    roleIds.forEach(function(item) {
        if (typeof item === 'object' && item !== null) {
            idList.push(String(item.id));
        } else {
            idList.push(String(item));
        }
    });

    console.log('[DEBUG] setCheckedRoleIds - idList:', idList);

    $('#roleListContainer input[name="roleIds"]').each(function() {
        var val = $(this).val();
        if (idList.indexOf(val) > -1) {
            $(this).prop('checked', true);
        }
    });

    form.render('checkbox');
}

/* ========== 自定义校验 ========== */

// 密码校验：新增必填，编辑可选
function initFormVerify(form, $) {
    form.verify({
        pwdRequired: function(value) {
            if (!isEditMode && (value === '' || value === null || value === undefined)) {
                return '请输入密码';
            }
        },
        phone: function(value) {
            if (value && !/^1[3-9]\d{9}$/.test(value)) {
                return '请输入正确的手机号';
            }
        }
    });
}

/* ========== 主逻辑 ========== */

layui.use(['form', 'layer'], function(){
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.jquery;

    // 判断是否编辑模式
    var userId = getQueryString('id');
    isEditMode = !!userId;

    if (isEditMode) {
        document.getElementById('userId').value = userId;
        document.getElementById('pwdTip').style.display = '';
        // 编辑时密码非必填
        document.getElementById('password').removeAttribute('lay-verify');
        document.getElementById('password').setAttribute('lay-verify', 'pwdRequired');
        // 隐藏密码required星号
        document.getElementById('pwdStar').style.display = 'none';
        document.title = '编辑用户';
    }

    // 注册自定义校验
    initFormVerify(form, $);

    // 并行加载部门和角色数据
    var loadDepts = loadDeptTree($);
    var loadRoles = loadRoleList($);

    $.when(loadDepts, loadRoles).done(function() {
        renderDeptTree(form);
        renderRoleList(form);
        bindDeptTreeEvents(form, $);

        // 编辑模式：加载用户数据 + 已选部门 + 已选角色
        if (isEditMode) {
            // 加载用户基本信息
            $.ajax({
                url: '/sys/user/get/' + userId,
                type: 'GET',
                headers: {token: token},
                success: function(res) {
                    if (res.code === 200 && res.data) {
                        var data = res.data;
                        document.getElementById('username').value = data.username || '';
                        // 编辑时密码不回显
                        document.getElementById('realName').value = data.realName || '';
                        document.getElementById('phone').value = data.phone || '';

                        // 回显岗位
                        if (data.sysPosition !== null && data.sysPosition !== undefined) {
                            $('select[name="sysPosition"]').val(data.sysPosition.toString());
                            form.render('select');
                        }

                        // 回显状态
                        if (data.status !== null && data.status !== undefined) {
                            $('input[name="status"][value="' + data.status + '"]').prop('checked', true);
                            form.render('radio');
                        }
                    }
                }
            });

            // 加载已选部门
            $.ajax({
                url: '/sys/userDept/listByUser/' + userId,
                type: 'GET',
                headers: {token: token},
                success: function(res) {
                    console.log('[DEBUG] /sys/userDept/listByUser response:', JSON.stringify(res));
                    if (res.code === 200 && res.data) {
                        setCheckedDeptIds(form, $, res.data);
                    }
                }
            });

            // 加载已选角色
            $.ajax({
                url: '/sys/user/roles/' + userId,
                type: 'GET',
                headers: {token: token},
                success: function(res) {
                    if (res.code === 200 && res.data) {
                        setCheckedRoleIds(form, $, res.data);
                    }
                }
            });
        }
    });

    // 监听提交
    var isSubmitting = false;
    form.on('submit(userSubmit)', function(){
        if (isSubmitting) return false;
        isSubmitting = true;

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value.trim();
        var realName = document.getElementById('realName').value.trim();
        var phone = document.getElementById('phone').value.trim();
        var sysPosition = $('select[name="sysPosition"]').val();
        var status = $('input[name="status"]:checked').val();
        var id = document.getElementById('userId').value;
        var deptIds = getCheckedDeptIds($);
        var roleIds = getCheckedRoleIds($);

        // 前端校验
        if (!username) {
            layer.msg('请输入用户名', {icon: 5});
            isSubmitting = false;
            return false;
        }
        if (!isEditMode && !password) {
            layer.msg('请输入密码', {icon: 5});
            isSubmitting = false;
            return false;
        }
        if (!realName) {
            layer.msg('请输入姓名', {icon: 5});
            isSubmitting = false;
            return false;
        }
        if (!phone) {
            layer.msg('请输入手机号', {icon: 5});
            isSubmitting = false;
            return false;
        }
        if (!/^1[3-9]\d{9}$/.test(phone)) {
            layer.msg('请输入正确的手机号', {icon: 5});
            isSubmitting = false;
            return false;
        }

        var url = isEditMode ? '/sys/user/update' : '/sys/user/add';
        var method = isEditMode ? 'PUT' : 'POST';

        // 禁用保存按钮
        var $submitBtn = $('#submitBtn');
        $submitBtn.prop('disabled', true).addClass('layui-btn-disabled').text('保存中...');

        var data = {
            username: username,
            realName: realName,
            phone: phone,
            status: parseInt(status),
            deptIds: deptIds,
            roleIds: roleIds
        };

        // 密码处理：编辑时如果为空则不传
        if (password) {
            data.password = password;
        }

        // 岗位处理
        if (sysPosition !== '') {
            data.sysPosition = sysPosition;
        }

        if (isEditMode) {
            data.id = parseInt(id);
        }

        $.ajax({
            url: url,
            type: method,
            headers: {token: token},
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(res) {
                if (res.code === 200) {
                    layer.msg(isEditMode ? '更新成功' : '新增成功', {icon: 1}, function(){
                        closeWindow();
                    });
                } else {
                    layer.msg(res.msg || '操作失败', {icon: 2});
                    isSubmitting = false;
                    $submitBtn.prop('disabled', false).removeClass('layui-btn-disabled').text('保存');
                }
            },
            error: function() {
                layer.msg('请求失败，请重试', {icon: 2});
                isSubmitting = false;
                $submitBtn.prop('disabled', false).removeClass('layui-btn-disabled').text('保存');
            }
        });
        return false;
    });
});
</script>
</body>
</html>
