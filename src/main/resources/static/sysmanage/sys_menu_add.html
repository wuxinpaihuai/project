<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单新增</title>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
            padding: 30px 20px;
        }
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .layui-form-item {
            margin-bottom: 20px;
        }
        .layui-form-label {
            width: 120px !important;
            padding: 9px 15px 9px 0;
        }
        .layui-input-block {
            margin-left: 120px !important;
        }
        .layui-input {
            height: 38px;
            line-height: 38px;
        }
        /* 必填星号 */
        .required-star {
            color: red;
            margin-right: 3px;
        }
        /* 图标选择器样式 */
        .icon-picker-wrapper {
            border: 1px solid #e6e6e6;
            border-radius: 4px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            background: #fff;
        }
        .icon-picker {
            display: flex;
            flex-wrap: wrap;
        }
        .icon-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            cursor: pointer;
            border: 1px solid #e8e8e8;
            margin: 2px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .icon-item:hover {
            border-color: #86c566;
            background-color: #f0fff0;
        }
        .icon-item.selected {
            border-color: #86c566;
            background-color: #86c566;
            color: #fff;
        }
        .icon-item i {
            font-size: 18px;
        }
        /* 父菜单单选框样式 */
        .parent-radio-group {
            margin-bottom: 10px;
        }
        .parent-select-wrapper {
            display: none;
            margin-top: 10px;
        }
        .parent-select-wrapper.show {
            display: block;
        }
        /* 按钮样式 */
        .btn-group {
            margin-top: 30px;
            padding-left: 120px;
        }
        .btn-green {
            background-color: #86c566 !important;
            color: #fff !important;
            border-color: #86c566 !important;
        }
        .btn-green:hover {
            background-color: #7ab857 !important;
        }
    </style>
</head>
<body>
<form class="layui-form form-container" lay-filter="menuForm" id="menuForm">
    <input type="hidden" name="id" id="menuId" value="">
    <input type="hidden" name="selectedIcon" id="selectedIcon" value="layui-icon-set">

    <!-- 菜单名称 -->
    <div class="layui-form-item">
        <label class="layui-form-label">
            <span class="required-star">*</span>菜单名称
        </label>
        <div class="layui-input-block">
            <input type="text" name="menuName" id="menuName" lay-verify="required|menuName" 
                   placeholder="请输入菜单名称" class="layui-input" style="width: 400px;" maxlength="50">
        </div>
    </div>

    <!-- 访问路径 -->
    <div class="layui-form-item">
        <label class="layui-form-label">
            <span class="required-star">*</span>访问路径
        </label>
        <div class="layui-input-block">
            <input type="text" name="menuPath" id="menuPath" lay-verify="required|menuPath" 
                   placeholder="请输入访问路径，如: sys_user.html" class="layui-input" style="width: 400px;" maxlength="100">
        </div>
    </div>

    <!-- 菜单图标 -->
    <div class="layui-form-item">
        <label class="layui-form-label">菜单图标</label>
        <div class="layui-input-block">
            <div class="icon-picker-wrapper">
                <div class="icon-picker" id="iconPicker"></div>
            </div>
        </div>
    </div>

    <!-- 父菜单 -->
    <div class="layui-form-item">
        <label class="layui-form-label">父菜单</label>
        <div class="layui-input-block">
            <div class="parent-radio-group">
                <input type="radio" name="hasParent" value="0" title="无（一级菜单）" checked>
                <input type="radio" name="hasParent" value="1" title="有">
            </div>
            <div class="parent-select-wrapper" id="parentSelectWrapper">
                <select name="parentId" id="parentIdSelect" lay-search style="width: 400px;">
                    <option value="">请选择父菜单</option>
                </select>
            </div>
        </div>
    </div>

    <!-- 排序号 -->
    <div class="layui-form-item">
        <label class="layui-form-label">排序号</label>
        <div class="layui-input-block">
            <input type="number" name="sortNum" id="sortNum" 
                   placeholder="数字越小越靠前" class="layui-input" style="width: 400px;" value="0">
        </div>
    </div>

    <!-- 按钮 -->
    <div class="layui-form-item btn-group">
        <button type="button" class="layui-btn btn-green" lay-submit lay-filter="menuSubmit">保存</button>
        <button type="button" class="layui-btn layui-btn-primary" onclick="closeWindow()">取消</button>
    </div>
</form>

<script src="/layui/layui.js"></script>
<script>
// 获取token
var token = localStorage.getItem('token');
var parentMenus = [];

// 50个layui图标
var iconList = [
    'layui-icon-set', 'layui-icon-set-fill', 'layui-icon-engine', 'layui-icon-layer',
    'layui-icon-util', 'layui-icon-templeate-1', 'layui-icon-app', 'layui-icon-website',
    'layui-icon-user', 'layui-icon-find-fill', 'layui-icon-help', 'layui-icon-chat',
    'layui-icon-survey', 'layui-icon-chart', 'layui-icon-chart-screen', 'layui-icon-transfer',
    'layui-icon-senior', 'layui-icon-refresh', 'layui-icon-refresh-1', 'layui-icon-face',
    'layui-icon-cart-simple', 'layui-icon-cart', 'layui-icon-next', 'layui-icon-prev',
    'layui-icon-upload', 'layui-icon-upload-drag', 'layui-icon-down', 'layui-icon-up',
    'layui-icon-add-circle', 'layui-icon-add-1', 'layui-icon-play', 'layui-icon-pause',
    'layui-icon-404', 'layui-icon-about', 'layui-icon-location', 'layui-icon-read',
    'layui-icon-dollar', 'layui-icon-fire', 'layui-icon-return', 'layui-icon-screen-full',
    'layui-icon-screen-restore', 'layui-icon-note', 'layui-icon-home', 'layui-icon-log',
    'layui-icon-login', 'layui-icon-logout', 'layui-icon-list', 'layui-icon-tree',
    'layui-icon-table', 'layui-icon-form'
];

// 获取URL参数
function getQueryString(name) {
    var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
    var r = window.location.search.substr(1).match(reg);
    if (r != null) {
        return decodeURIComponent(r[2]);
    }
    return null;
}

// 关闭窗口
function closeWindow() {
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
}

// 生成图标选择器
function generateIconPicker(selectedIcon) {
    var html = '';
    iconList.forEach(function(icon) {
        var isSelected = icon === selectedIcon ? ' selected' : '';
        html += '<div class="icon-item' + isSelected + '" data-icon="' + icon + '">';
        html += '<i class="layui-icon ' + icon + '"></i>';
        html += '</div>';
    });
    document.getElementById('iconPicker').innerHTML = html;
}

// 加载父菜单列表
function loadParentMenus() {
    console.log('开始加载父菜单...');
    console.log('token:', token);
    console.log('请求URL:', '/sys/menu/all');
    
    return $.ajax({
        url: '/sys/menu/all',
        type: 'GET',
        headers: {token: token},
        success: function(res) {
            console.log('父菜单数据响应:', res);
            if (res.code === 200) {
                parentMenus = res.data || [];
                console.log('已加载父菜单数量:', parentMenus.length);
            } else if (res.code === 401) {
                layer.msg('请先登录', {icon: 2}, function() {
                    parent.location.href = '/login.html';
                });
            }
        },
        error: function(xhr, status, error) {
            console.error('加载父菜单失败:', status, error);
            console.error('响应状态:', xhr.status);
            console.error('响应内容:', xhr.responseText);
            layer.msg('加载父菜单失败: ' + error, {icon: 2});
        }
    });
}

// 填充父菜单下拉框
function fillParentMenus() {
    var select = document.getElementById('parentIdSelect');
    var options = '<option value="">请选择父菜单</option>';
    parentMenus.forEach(function(menu) {
        options += '<option value="' + menu.id + '">' + menu.menuName + '</option>';
    });
    select.innerHTML = options;
    // 渲染下拉框
    if (typeof layui !== 'undefined') {
        layui.form.render('select');
    }
}

layui.use(['form', 'layer'], function(){
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.jquery;

    // 页面加载时立即加载父菜单（确保点击时有数据）
    loadParentMenus().done(function() {
        console.log('父菜单加载完成，开始渲染下拉框');
        fillParentMenus();
    });

    // 生成图标选择器
    generateIconPicker('layui-icon-set');

    // 获取编辑数据
    var menuId = getQueryString('id');
    if (menuId) {
        document.getElementById('menuId').value = menuId;
        $.ajax({
            url: '/sys/menu/get/' + menuId,
            type: 'GET',
            headers: {token: token},
            success: function(res) {
                if (res.code === 200 && res.data) {
                    var data = res.data;
                    document.getElementById('menuName').value = data.menuName || '';
                    document.getElementById('menuPath').value = data.menuPath || '';
                    document.getElementById('sortNum').value = data.sortNum || 0;
                    document.getElementById('selectedIcon').value = data.menuIcon || 'layui-icon-set';
                    
                    // 生成图标选择器（选中当前图标）
                    generateIconPicker(data.menuIcon || 'layui-icon-set');
                    
                    // 设置父菜单
                    if (data.parentId && data.parentId != 0) {
                        $('input[name="hasParent"][value="1"]').prop('checked', true);
                        $('input[name="hasParent"][value="0"]').prop('checked', false);
                        $('#parentSelectWrapper').addClass('show');
                        $('#parentIdSelect').val(data.parentId);
                    }
                    form.render();
                }
            }
        });
    }

    // 监听图标选择
    $('#iconPicker').on('click', '.icon-item', function(){
        $('#iconPicker .icon-item').removeClass('selected');
        $(this).addClass('selected');
        $('#selectedIcon').val($(this).data('icon'));
    });

    // 监听父菜单单选框
    form.on('radio(hasParent)', function(data){
        if (data.value === '0') {
            $('#parentSelectWrapper').hide();
            $('#parentIdSelect').val('');
        } else {
            $('#parentSelectWrapper').show();
            form.render('select');
        }
    });

    // 自定义验证规则
    form.verify({
        menuName: function(value) {
            if (!value || value.trim() === '') {
                return '请输入菜单名称';
            }
            if (value.length > 50) {
                return '菜单名称不能超过50个字符';
            }
        },
        menuPath: function(value) {
            if (!value || value.trim() === '') {
                return '请输入访问路径';
            }
            if (value.length > 100) {
                return '访问路径不能超过100个字符';
            }
        }
    });

    // 监听提交
    form.on('submit(menuSubmit)', function(){
        var menuName = document.getElementById('menuName').value.trim();
        var menuPath = document.getElementById('menuPath').value.trim();
        var sortNum = document.getElementById('sortNum').value || 0;
        var menuIcon = document.getElementById('selectedIcon').value;
        var hasParent = $('input[name="hasParent"]:checked').val();
        var parentId = hasParent === '1' ? ($('#parentIdSelect').val() || 0) : 0;
        var id = document.getElementById('menuId').value;
        
        var isEdit = !!id;
        var url = isEdit ? '/sys/menu/update' : '/sys/menu/add';
        var method = 'POST';
        
        var data = {
            menuName: menuName,
            menuPath: menuPath,
            sortNum: parseInt(sortNum),
            menuIcon: menuIcon,
            parentId: parseInt(parentId)
        };
        
        if (isEdit) {
            data.id = parseInt(id);
        }
        
        $.ajax({
            url: url,
            type: method,
            headers: {token: token},
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(res) {
                if (res.code === 200) {
                    layer.msg(isEdit ? '更新成功' : '新增成功', {icon: 1}, function(){
                        closeWindow();
                    });
                } else {
                    layer.msg(res.msg || '操作失败', {icon: 2});
                }
            }
        });
        return false;
    });
});
</script>
</body>
</html>
