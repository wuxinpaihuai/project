<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            font-family: "Microsoft YaHei", sans-serif;
            padding: 20px;
        }
        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e8e8e8;
        }
        .search-form {
            background-color: #fafafa;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .search-form .layui-form-item {
            display: inline-block;
            margin-bottom: 0;
            margin-right: 15px;
            vertical-align: middle;
        }
        .search-form .layui-form-label {
            width: 80px;
            padding: 9px 10px 9px 0;
        }
        .search-form .layui-input-inline {
            width: 180px;
        }
        .btn-green {
            background-color: #86c566 !important;
            color: #fff !important;
            border-color: #86c566 !important;
        }
        .btn-green:hover {
            background-color: #7ab857 !important;
            border-color: #7ab857 !important;
        }
        .btn-outline-green {
            background-color: #fff !important;
            color: #86c566 !important;
            border-color: #86c566 !important;
        }
        .btn-outline-green:hover {
            background-color: #f0fff0 !important;
        }
        .table-toolbar {
            margin-bottom: 15px;
        }
        .status-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
        }
        .status-enabled {
            background-color: #e8f5e9;
            color: #4caf50;
        }
        .status-disabled {
            background-color: #ffebee;
            color: #f44336;
        }
        /* 表格容器 */
        .table-container {
            background-color: #fff;
            padding: 15px;
            border-radius: 4px;
        }
        /* 分页样式覆盖 */
        .layui-laypage {
            margin: 15px 0 0 0;
        }
        .layui-laypage .layui-laypage-curr .layui-laypage-em {
            background-color: #86c566 !important;
        }
        .layui-laypage a, .layui-laypage span {
            color: #666;
        }
        .layui-laypage .layui-laypage-curr span {
            color: #fff !important;
        }
    </style>
</head>
<body>
<div class="page-title">用户管理</div>

<!-- 搜索表单 -->
<div class="search-form">
    <form class="layui-form" lay-filter="searchForm">
        <div class="layui-form-item">
            <label class="layui-form-label">用户名</label>
            <div class="layui-input-inline">
                <input type="text" name="username" placeholder="请输入用户名" class="layui-input" id="searchUsername">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">手机号</label>
            <div class="layui-input-inline">
                <input type="text" name="phone" placeholder="请输入手机号" class="layui-input" id="searchPhone">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">是否禁用</label>
            <div class="layui-input-inline">
                <select name="disabled" class="layui-input" id="searchDisabled">
                    <option value="">全部</option>
                    <option value="0">否</option>
                    <option value="1">是</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <button type="button" class="layui-btn btn-green" onclick="doSearch()">
                <i class="layui-icon layui-icon-search"></i> 查询
            </button>
            <button type="button" class="layui-btn btn-outline-green" onclick="doReset()">
                <i class="layui-icon layui-icon-refresh"></i> 重置
            </button>
        </div>
    </form>
</div>

<!-- 工具栏 -->
<div class="table-toolbar">
    <button class="layui-btn btn-green" onclick="addUser()">
        <i class="layui-icon layui-icon-add-1"></i> 新增
    </button>
    <button class="layui-btn btn-outline-green" onclick="batchDelete()">
        <i class="layui-icon layui-icon-delete"></i> 批量删除
    </button>
</div>

<!-- 数据表格 -->
<div class="table-container">
    <table class="layui-hide" id="userTable" lay-filter="userTable"></table>
</div>

<!-- 表格工具栏模板 -->
<script type="text/html" id="toolbarTpl">
    <a class="layui-btn layui-btn-xs btn-green" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
</script>

<!-- 状态模板 -->
<script type="text/html" id="statusTpl">
    {{# if(d.status === 1){ }}
        <span class="status-tag status-enabled">正常</span>
    {{# } else { }}
        <span class="status-tag status-disabled">禁用</span>
    {{# } }}
</script>

<!-- 职位模板 -->
<script type="text/html" id="positionTpl">
    {{#
        var positionMap = {
            '0': '董事长',
            '1': '总裁',
            '2': '副总裁',
            '3': '处长',
            '4': '副处长',
            '5': '技术学术委员会主任',
            '6': '副主任',
            '7': '处长助理',
            '8': '普通员工'
        };
    }}
    {{= positionMap[d.sysPosition] || '-' }}
</script>

<script src="/layui/layui.js"></script>
<script>
// 获取token
var token = localStorage.getItem('token');

layui.use(['table', 'form', 'layer'], function(){
    var table = layui.table;
    var form = layui.form;
    var layer = layui.layer;
    
    // 渲染表格（从后端接口获取数据）
    table.render({
        elem: '#userTable',
        url: '/sys/user/list',
        method: 'get',
        headers: {token: token},
        cols: [[
            {type: 'checkbox', fixed: 'left'},
            {field: 'id', title: 'ID', width: 60, sort: true, fixed: 'left'},
            {field: 'username', title: '用户名', minWidth: 100},
            {field: 'realName', title: '真实姓名', minWidth: 100},
            {field: 'phone', title: '手机号', minWidth: 120},
            {field: 'sysPosition', title: '岗位', minWidth: 150, templet: '#positionTpl'},
            {field: 'status', title: '状态', width: 80, templet: '#statusTpl'},
            {field: 'createTime', title: '创建时间', minWidth: 160},
            {fixed: 'right', title: '操作', width: 120, align: 'center', toolbar: '#toolbarTpl'}
        ]],
        page: true,
        limit: 5,
        limits: [5, 10, 20, 50],
        even: true,
        skin: 'line',
        request: {
            pageName: 'pageNum',
            limitName: 'pageSize'
        },
        response: {
            statusName: 'code',
            statusCode: 200,
            msgName: 'msg',
            countName: 'total',
            dataName: 'records'
        },
        done: function(res, curr, count){
            if (res.code === 401) {
                layer.msg('登录已过期，请重新登录', {icon: 5});
                setTimeout(function() {
                    window.parent.location.href = '/login.html';
                }, 1500);
            }
        }
    });
    
    // 监听工具条
    table.on('tool(userTable)', function(obj){
        var data = obj.data;
        if(obj.event === 'del'){
            layer.confirm('确定删除用户【' + data.username + '】吗？', function(index){
                $.ajax({
                    url: '/sys/user/delete/' + data.id,
                    type: 'DELETE',
                    headers: {token: token},
                    success: function(res) {
                        if (res.code === 200) {
                            obj.del();
                            layer.close(index);
                            layer.msg('删除成功', {icon: 1});
                        } else {
                            layer.msg(res.msg || '删除失败', {icon: 2});
                        }
                    }
                });
            });
        } else if(obj.event === 'edit'){
            layer.msg('编辑用户：' + data.username, {icon: 1});
        }
    });
});

// 查询方法
function doSearch() {
    var username = document.getElementById('searchUsername').value.trim();
    var phone = document.getElementById('searchPhone').value.trim();
    var disabled = document.getElementById('searchDisabled').value;
    
    layui.use('table', function(){
        var table = layui.table;
        table.reload('userTable', {
            where: {
                username: username,
                phone: phone,
                disabled: disabled === '' ? null : disabled
            },
            page: {curr: 1}
        });
    });
}

// 重置方法
function doReset() {
    document.getElementById('searchUsername').value = '';
    document.getElementById('searchPhone').value = '';
    document.getElementById('searchDisabled').value = '';
    
    layui.use('table', function(){
        var table = layui.table;
        table.reload('userTable', {
            where: {
                username: '',
                phone: '',
                disabled: null
            },
            page: {curr: 1}
        });
    });
}

// 新增用户
function addUser() {
    layui.use('layer', function(){
        var layer = layui.layer;
        layer.msg('新增功能开发中', {icon: 0});
    });
}

// 批量删除
function batchDelete() {
    layui.use('table', function(){
        var table = layui.table;
        var checkStatus = table.checkStatus('userTable');
        if (checkStatus.data.length === 0) {
            layui.use('layer', function(){
                var layer = layui.layer;
                layer.msg('请选择要删除的数据', {icon: 0});
            });
        } else {
            layui.use('layer', function(){
                var layer = layui.layer;
                layer.msg('已选择 ' + checkStatus.data.length + ' 条数据', {icon: 1});
            });
        }
    });
}
</script>
</body>
</html>
